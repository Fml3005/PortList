version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rancher_ports_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rancher_ports
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: rancher_ports_web
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=rancher_ports
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: